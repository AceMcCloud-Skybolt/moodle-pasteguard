name: Moodle Plugin CI

on: [push, pull_request]

jobs:
  jsunit:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install JS test dependencies (jsdom)
        run: npm ci
      - name: JS unit tests (tiny_pasteguard comparison module)
        run: npm test

  ci:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        plugin: [tiny_pasteguard, local_pasteguard]
        php: ['8.2', '8.3']
        moodle-branch: [MOODLE_501_STABLE]
        database: [mariadb, pgsql]

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_USER: root
          MYSQL_ALLOW_EMPTY_PASSWORD: true
          MYSQL_CHARACTER_SET_SERVER: utf8mb4
          MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
        ports:
          - 3306:3306
        options: --health-cmd="mariadb-admin ping" --health-interval 10s --health-timeout 5s --health-retries 3
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 3

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          path: repo

      # moodle-plugin-ci targets one plugin per run: copy the matrixed plugin
      # to ./plugin (sibling of ./moodle, never nested) and add the other one
      # so the pair is always tested together.
      - name: Select plugin under test
        run: cp -r repo/${{ matrix.plugin }} plugin

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pgsql, mysqli, zip, gd, xmlrpc, soap, intl
          ini-values: max_input_vars=5000
          coverage: none

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4
          echo $(cd ci/bin; pwd) >> $GITHUB_PATH
          echo $(cd ci/vendor/bin; pwd) >> $GITHUB_PATH
          sudo locale-gen en_AU.UTF-8
          echo "NVM_DIR=$HOME/.nvm" >> $GITHUB_ENV

      # The two plugins have a hard dependency (local_pasteguard requires
      # tiny_pasteguard), so the sibling from this monorepo must be installed
      # alongside the plugin under test. moodle-plugin-ci has no way to pull a
      # plugin from a subdirectory of a repo (add-plugin only clones a whole
      # repo), so stage the sibling in a parent directory and pass it to
      # install --extra-plugins, which installs every immediate child dir as a
      # plugin. Moodle resolves dependency ordering during install itself.
      - name: Stage sibling plugin
        run: |
          mkdir -p "$GITHUB_WORKSPACE/moodle-extra"
          if [ "${{ matrix.plugin }}" = "tiny_pasteguard" ]; then
            cp -r repo/local_pasteguard "$GITHUB_WORKSPACE/moodle-extra/local_pasteguard"
          else
            cp -r repo/tiny_pasteguard "$GITHUB_WORKSPACE/moodle-extra/tiny_pasteguard"
          fi

      - name: Install Moodle and plugins
        run: |
          moodle-plugin-ci install \
            --plugin ./plugin \
            --extra-plugins "$GITHUB_WORKSPACE/moodle-extra" \
            --db-host=127.0.0.1
        env:
          DB: ${{ matrix.database }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: PHP Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phplint

      - name: Moodle Code Checker
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpcs --max-warnings 0

      - name: Moodle PHPDoc Checker
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpdoc --max-warnings 0

      - name: Validating
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci validate

      - name: Check upgrade savepoints
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci savepoints

      - name: Mustache Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci mustache

      - name: PHPUnit tests
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpunit --fail-on-warning

      - name: Behat features
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci behat --profile chrome
